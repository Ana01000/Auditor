    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { background-color: #ffffff; color: #333; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: #007bff !important; }
        
        /* Cores de Status que você pediu */
        .btn-check:checked + .btn-outline-primary { background-color: #007bff !important; color: white !important; }
        .status-prejuizo { background-color: #ff4d4d !important; color: white !important; font-weight: bold; }
        
        /* Telas */
        #loginScreen { height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #f8f9fa; }
        .login-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        .hidden { display: none; }
        
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; padding: 20px; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box text-center">
        <h4 class="mb-4">Auditor de Estoque</h4>
        <input type="email" id="userLogin" class="form-control mb-2" placeholder="E-mail">
        <input type="password" id="passLogin" class="form-control mb-3" placeholder="Senha">
        <button class="btn btn-primary w-100" onclick="realizarLogin()">Acessar Sistema</button>
    </div>
</div>

<div id="mainUI" class="hidden">
    <nav class="navbar navbar-dark shadow-sm p-3">
        <span class="navbar-brand mb-0 h1">Auditor de Estoque Reverso</span>
        <button onclick="location.reload()" class="btn btn-sm btn-outline-light">Sair</button>
    </nav>

    <div class="d-flex bg-light border-bottom p-2 gap-2">
        <button class="btn btn-sm btn-light border" onclick="showTab('dashboard')">Dashboard</button>
        <button class="btn btn-sm btn-light border" onclick="showTab('registro')">Registrar Entrada</button>
        <button class="btn btn-sm btn-light border" onclick="showTab('relatorios')">Histórico</button>
    </div>

    <div class="content">
        <div id="dashboard" class="tab-content active">
            <div class="row text-center">
                <div class="col-md-4"><div class="card"><h6>Total Registros</h6><p id="dashTotal" class="h3">0</p></div></div>
                <div class="col-md-4"><div class="card border-start border-success border-4"><h6>Reestoque</h6><p id="dashReestoque" class="h3 text-success">0</p></div></div>
                <div class="col-md-4"><div class="card border-start border-danger border-4"><h6>Perda/Prejuízo</h6><p id="dashPerda" class="h3 text-danger">0</p></div></div>
            </div>
            <div style="max-width: 350px; margin: auto;">
                <canvas id="chartPizza"></canvas>
            </div>
        </div>

        <div id="registro" class="tab-content">
            <div class="card mx-auto" style="max-width: 600px;">
                <h5>Novo Registro de Devolução</h5>
                <hr>
                <input type="text" id="sku" class="form-control mb-2" placeholder="Bipar SKU ou Código">
                <input type="text" id="nome" class="form-control mb-3" placeholder="Nome do Produto">
                
                <label><b>Destino do Produto:</b></label>
                <div class="btn-group w-100 mb-3">
                    <input type="radio" class="btn-check" name="status" id="st1" value="Reestoque" checked onchange="toggleGarantia()">
                    <label class="btn btn-outline-primary" for="st1">Reestoque</label>
                    <input type="radio" class="btn-check" name="status" id="st2" value="Garantia" onchange="toggleGarantia()">
                    <label class="btn btn-outline-primary" for="st2">Garantia</label>
                    <input type="radio" class="btn-check" name="status" id="st3" value="Perda Total" onchange="toggleGarantia()">
                    <label class="btn btn-outline-primary" for="st3">Perda Total</label>
                </div>

                <div id="campoGarantia" class="hidden mb-3 p-2 bg-light rounded">
                    <input type="text" id="notaGarantia" class="form-control" placeholder="Número da Nota Fiscal">
                </div>

                <button class="btn btn-success w-100 py-2" onclick="salvarNoSupabase()">Sincronizar com Nuvem</button>
            </div>
        </div>

        <div id="relatorios" class="tab-content">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5>Histórico de Devoluções</h5>
                <button onclick="exportarExcel()" class="btn btn-sm btn-dark">Exportar Excel</button>
            </div>
            <div class="table-responsive">
                <table class="table table-bordered table-hover">
                    <thead class="table-light"><tr><th>Data</th><th>SKU</th><th>Produto</th><th>Status</th><th>NF</th></tr></thead>
                    <tbody id="corpoRelatorio"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
