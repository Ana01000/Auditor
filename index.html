<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Logística Reverso Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #007bff;
            --danger-red: #ff4d4d;
            --success-green: #28a745;
        }

        body {
            background-color: #ffffff !important;
            color: #333;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Tela de Login */
        #loginScreen {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
        }

        /* Interface Principal */
        header {
            background-color: var(--primary-blue);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav {
            background: #f1f1f1;
            padding: 10px;
            display: flex;
            gap: 10px;
            border-bottom: 2px solid #ddd;
        }

        nav button {
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            background: white;
        }

        nav button:hover { background: #e0e0e0; }

        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }

        /* Cores de Status que você pediu */
        .status-critico { background-color: var(--danger-red) !important; color: white; }
        .btn-check:checked + .btn-outline-primary { background-color: var(--primary-blue) !important; color: white !important; }
        
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; padding: 20px; }
        .hidden { display: none; }
        table { width: 100%; margin-top: 15px; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #f8f9fa; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <h4 class="text-center mb-4">Reverso Cloud</h4>
        <input type="email" id="userLogin" class="form-control mb-2" placeholder="E-mail">
        <input type="password" id="passLogin" class="form-control mb-3" placeholder="Senha">
        <button class="btn btn-primary w-100" onclick="realizarLogin()">Acessar Sistema</button>
    </div>
</div>

<div id="mainUI" class="hidden">
    <header>
        <span style="font-weight:bold">Logística Arpex</span>
        <button onclick="location.reload()" class="btn btn-sm btn-light">Sair</button>
    </header>

    <nav>
        <button onclick="showTab('dashboard')">Dashboard</button>
        <button onclick="showTab('registro')">Registrar</button>
        <button onclick="showTab('relatorios')">Histórico</button>
    </nav>

    <div class="content">
        <div id="dashboard" class="tab-content active">
            <h2>Resumo (30 dias)</h2>
            <div class="row text-center">
                <div class="col-md-4"><div class="card bg-light"><h3>Total</h3><p id="dashTotal" class="h2">0</p></div></div>
                <div class="col-md-4"><div class="card bg-success text-white"><h3>Reestoque</h3><p id="dashReestoque" class="h2">0</p></div></div>
                <div class="col-md-4"><div class="card status-critico"><h3>Perda Total</h3><p id="dashPerda" class="h2">0</p></div></div>
            </div>
            <div style="max-width: 400px; margin: auto;">
                <canvas id="chartPizza"></canvas>
            </div>
        </div>

        <div id="registro" class="tab-content">
            <div class="card">
                <h2>Novo Registro</h2>
                <input type="text" id="sku" class="form-control mb-2" placeholder="SKU do Produto" oninput="autocompleteSKU()">
                <input type="text" id="nome" class="form-control mb-2" placeholder="Nome do Produto">
                
                <label class="mt-2"><b>Destino:</b></label>
                <div class="btn-group w-100 mt-1 mb-3">
                    <input type="radio" class="btn-check" name="status" id="st1" value="Reestoque" checked onchange="toggleGarantia()">
                    <label class="btn btn-outline-primary" for="st1">Reestoque</label>
                    <input type="radio" class="btn-check" name="status" id="st2" value="Garantia" onchange="toggleGarantia()">
                    <label class="btn btn-outline-primary" for="st2">Garantia</label>
                    <input type="radio" class="btn-check" name="status" id="st3" value="Perda Total" onchange="toggleGarantia()">
                    <label class="btn btn-outline-primary" for="st3">Perda Total</label>
                </div>

                <div id="campoGarantia" class="hidden mb-2">
                    <input type="text" id="notaGarantia" class="form-control" placeholder="Número da Nota Fiscal">
                </div>

                <button class="btn btn-success w-100 mt-3" onclick="salvarNoSupabase()">Salvar na Nuvem</button>
            </div>
        </div>

        <div id="relatorios" class="tab-content">
            <div class="d-flex justify-content-between align-items-center">
                <h2>Histórico</h2>
                <button onclick="exportarExcel()" class="btn btn-dark">Exportar Excel</button>
            </div>
            <div class="table-responsive">
                <table>
                    <thead><tr><th>Data</th><th>SKU</th><th>Produto</th><th>Status</th><th>NF</th></tr></thead>
                    <tbody id="corpoRelatorio"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // CONFIGURAÇÃO SUPABASE
    const SUPABASE_URL = "https://felxwahypthusgkspnbo.supabase.co"
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlbHh3YWh5cHRodXNna3NwbmJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNTk2MTYsImV4cCI6MjA4OTkzNTYxNn0.ZwO_RbL2h5vuU-PbgEpKorGWOr_DLJ8fxr-t07pdIJs"; //
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let estoque = [];
    let myChart = null;

    async function realizarLogin() {
        const email = document.getElementById('userLogin').value;
        const password = document.getElementById('passLogin').value;

        const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

        if (error) {
            alert("Erro: " + error.message);
        } else {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainUI').classList.remove('hidden');
            await carregarDados();
        }
    }

    async function carregarDados() {
        const { data, error } = await _supabase.from('estoque_reverso').select('*').order('created_at', { ascending: false });
        if(data) {
            estoque = data;
            atualizarTabela();
            atualizarDashboard();
        }
    }

    async function salvarNoSupabase() {
        const statusSel = document.querySelector('input[name="status"]:checked').value;
        const item = {
            sku: document.getElementById('sku').value,
            nome: document.getElementById('nome').value,
            status: statusSel,
            nota_garantia: document.getElementById('notaGarantia').value || 'N/A'
        };

        if(!item.sku) return alert("SKU Obrigatório");

        const { error } = await _supabase.from('estoque_reverso').insert([item]);
        if(error) alert("Erro: " + error.message);
        else {
            alert("Salvo com sucesso!");
            limparCampos();
            await carregarDados();
        }
    }

    function atualizarDashboard() {
        const r = estoque.filter(x => x.status === 'Reestoque').length;
        const g = estoque.filter(x => x.status === 'Garantia').length;
        const p = estoque.filter(x => x.status === 'Perda Total').length;

        document.getElementById('dashTotal').innerText = estoque.length;
        document.getElementById('dashReestoque').innerText = r;
        document.getElementById('dashPerda').innerText = p;

        if(myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('chartPizza'), {
            type: 'doughnut',
            data: {
                labels: ['Reestoque', 'Garantia', 'Perda'],
                datasets: [{ data: [r, g, p], backgroundColor: ['#28a745', '#007bff', '#ff4d4d'] }]
            }
        });
    }

    function atualizarTabela() {
        document.getElementById('corpoRelatorio').innerHTML = estoque.map(p => `
            <tr class="${p.status === 'Perda Total' ? 'status-critico' : ''}">
                <td>${new Date(p.created_at).toLocaleDateString()}</td>
                <td>${p.sku}</td>
                <td>${p.nome}</td>
                <td>${p.status}</td>
                <td>${p.nota_garantia}</td>
            </tr>
        `).join('');
    }

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function toggleGarantia() {
        const status = document.querySelector('input[name="status"]:checked').value;
        document.getElementById('campoGarantia').classList.toggle('hidden', status !== 'Garantia');
    }

    function limparCampos() {
        ['sku', 'nome', 'notaGarantia'].forEach(i => document.getElementById(i).value = '');
    }

    function exportarExcel() {
        const ws = XLSX.utils.json_to_sheet(estoque);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Estoque");
        XLSX.writeFile(wb, "Relatorio_Reverso.xlsx");
    }
</script>
</body>
</html>
