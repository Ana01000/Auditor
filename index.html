<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditor Pro - Gestão de Acesso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #0056ff; --bg: #f8fafc; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .navbar { background: white; border-bottom: 2px solid #eef2f7; padding: 12px 25px; display: flex; justify-content: space-between; }
        .nav-tabs-custom { background: white; display: flex; padding: 10px 20px; gap: 8px; border-bottom: 1px solid #e2e8f0; }
        .nav-link-custom { padding: 10px 18px; border-radius: 10px; cursor: pointer; color: #64748b; font-size: 13px; font-weight: 600; }
        .nav-link-custom.active { background: var(--primary); color: white; }
        .tab-content { display: none; padding: 25px; flex: 1; overflow-y: auto; }
        .tab-content.active { display: block; }
        .card-custom { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 15px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; margin-bottom: 20px; }
        .hidden { display: none !important; }
        .btn-primary { background: var(--primary); border: none; font-weight: 700; }
        .badge-role { font-size: 10px; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; margin-left: 10px; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="bg-white p-5 shadow-lg" style="width: 380px; border-radius: 24px; margin: 100px auto;">
        <h4 class="fw-bold text-primary text-center mb-4">Acesso Auditor</h4>
        <input type="email" id="userLogin" class="form-control mb-3" placeholder="E-mail">
        <input type="password" id="passLogin" class="form-control mb-4" placeholder="Senha">
        <button class="btn btn-primary w-100 py-3" onclick="realizarLogin()">ENTRAR</button>
    </div>
</div>

<div id="mainUI" class="hidden">
    <nav class="navbar">
        <span class="fw-bold text-primary">AUDITOR DE ESTOQUE <span id="roleBadge" class="badge bg-secondary badge-role">Gerente</span></span>
        <span id="userNameTop" class="text-muted small">---</span>
    </nav>

    <div class="nav-tabs-custom">
        <div class="nav-link-custom active" onclick="showTab('dashboard', this)">Dashboard</div>
        <div class="nav-link-custom" onclick="showTab('registro', this)">Registro</div>
        <div class="nav-link-custom" onclick="showTab('garantias', this)">Garantias</div>
        <div class="nav-link-custom" onclick="showTab('config', this)">Meu Perfil</div>
        <div class="nav-link-custom text-danger ms-auto" onclick="logout()">Sair</div>
    </div>

    <div id="registro" class="tab-content">
        <div class="card-custom mx-auto" style="max-width: 600px;">
            <h5 class="fw-bold mb-4">Entrada de Dados</h5>
            <div id="msgBloqueio" class="alert alert-warning d-none">Seu perfil de <b>Gerente</b> permite apenas visualização.</div>
            <input type="text" id="sku" class="form-control mb-3" placeholder="SKU">
            <input type="text" id="nome" class="form-control mb-3" placeholder="Nome do Produto">
            <button class="btn btn-primary w-100" id="btnSalvar" onclick="salvarRegistro()">SALVAR REGISTRO</button>
        </div>
    </div>

    <div id="config" class="tab-content">
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card-custom">
                    <h5 class="fw-bold mb-4">Meus Dados</h5>
                    <label class="small fw-bold">NOME</label>
                    <input type="text" id="perfilNome" class="form-control mb-3">
                    <button class="btn btn-outline-primary w-100" onclick="atualizarNome()">ATUALIZAR NOME</button>
                    
                    <hr class="my-4">
                    
                    <h5 class="fw-bold mb-3">Segurança</h5>
                    <label class="small fw-bold">NOVA SENHA</label>
                    <input type="password" id="newPass" class="form-control mb-3" placeholder="Mínimo 6 caracteres">
                    <button class="btn btn-dark w-100" onclick="alterarSenha()">ALTERAR MINHA SENHA</button>
                </div>
            </div>
            <div class="col-md-6 admin-only hidden">
                <div class="card-custom border-primary">
                    <h5 class="fw-bold mb-4">Criar Novo Gerente</h5>
                    <input type="email" id="novoEmail" class="form-control mb-2" placeholder="E-mail do gerente">
                    <input type="password" id="novoPass" class="form-control mb-3" placeholder="Senha inicial">
                    <button class="btn btn-primary w-100" onclick="criarGerente()">CADASTRAR</button>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard" class="tab-content active"><div class="card-custom">Dashboard em carregamento...</div></div>
    <div id="garantias" class="tab-content"><div class="card-custom">Consulte as NFs no banco de dados.</div></div>
</div>

<script>
    const SUPABASE_URL = "https://felxwahypthusgkspnbo.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlbHh3YWh5cHRodXNna3NwbmJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNTk2MTYsImV4cCI6MjA4OTkzNTYxNn0.ZwO_RbL2h5vuU-PbgEpKorGWOr_DLJ8fxr-t07pdIJs";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let usuarioAtual = null;
    let perfilAtual = null;

    async function checarSessao() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) carregarPerfil(session.user);
    }
    checarSessao();

    async function realizarLogin() {
        const email = document.getElementById('userLogin').value;
        const password = document.getElementById('passLogin').value;
        const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
        if (error) alert("Erro: " + error.message); else carregarPerfil(data.user);
    }

    async function carregarPerfil(user) {
        usuarioAtual = user;
        const { data } = await _supabase.from('perfis').select('*').eq('id', user.id).single();
        perfilAtual = data;

        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainUI').classList.remove('hidden');
        document.getElementById('userNameTop').innerText = data?.nome || user.email;
        document.getElementById('perfilNome').value = data?.nome || '';
        
        const badge = document.getElementById('roleBadge');
        badge.innerText = data?.cargo || 'gerente';
        
        // TRAVA DE SEGURANÇA: Bloqueia botões se for gerente
        if (data?.cargo !== 'admin' && user.email !== 'club.anatiradentes@gmail.com') {
            document.getElementById('btnSalvar').disabled = true;
            document.getElementById('msgBloqueio').classList.remove('d-none');
            badge.className = "badge bg-secondary badge-role";
        } else {
            document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
            badge.className = "badge bg-primary badge-role";
        }
    }

    async function alterarSenha() {
        const novaSenha = document.getElementById('newPass').value;
        if(novaSenha.length < 6) return alert("Senha muito curta!");
        const { error } = await _supabase.auth.updateUser({ password: novaSenha });
        if(error) alert("Erro ao mudar senha."); else alert("Senha alterada com sucesso!");
    }

    async function atualizarNome() {
        const novoNome = document.getElementById('perfilNome').value;
        const { error } = await _supabase.from('perfis').upsert({ id: usuarioAtual.id, nome: novoNome });
        if(error) alert("Erro ao salvar nome."); else { alert("Nome atualizado!"); location.reload(); }
    }

    async function criarGerente() {
        const email = document.getElementById('novoEmail').value;
        const password = document.getElementById('novoPass').value;
        // Nota: O cadastro aqui cria no Auth, você precisará inserir manualmente na tabela 'perfis' via Dashboard ou Trigger.
        const { data, error } = await _supabase.auth.signUp({ email, password });
        if(!error) alert("Gerente criado! Peça para ele logar.");
    }

    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-link-custom').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    async function logout() { await _supabase.auth.signOut(); location.reload(); }
</script>
</body>
</html>
